---
- name: DNS 서버 자동 배포 및 설정
  hosts: dns_servers
  become: yes

  tasks:
    - name: 1. BIND (DNS 패키지) 설치
      ansible.builtin.dnf:
        name: "{{ dns_packages }}"
        state: present

    - name: 2. Jinja2 템플릿을 사용하여 named.conf 배포
      ansible.builtin.template:
        src: config_templates/named.conf.j2  # 템플릿 폴더 안의 파일 지정
        dest: /etc/named.conf
        owner: root
        group: named
        mode: '0640'
      notify: DNS 서비스 재시작

    - name: 3. 방화벽에서 DNS 서비스(53포트) 허용
      ansible.builtin.firewalld:
        service: dns
        permanent: yes
        state: enabled
        immediate: yes

    - name: 4. DNS 서비스 활성화 및 시작
      ansible.builtin.systemd:
        name: named
        state: started
        enabled: yes

  handlers:
    - name: DNS 서비스 재시작
      ansible.builtin.systemd:
        name: named
        state: restarted

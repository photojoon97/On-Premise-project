---
- name: DHCP 서버 자동 배포 및 설정
  hosts: dhcp_servers
  become: yes

  tasks:
    - name: 1. DHCP 패키지 설치
      ansible.builtin.dnf:
        name: dhcp-server
        state: present

    - name: 2. Jinja2 템플릿을 사용하여 dhcpd.conf 배포
      ansible.builtin.template:
        src: config_templates/dhcpd.conf.j2  # 템플릿 폴더 안의 파일 지정
        dest: /etc/dhcp/dhcpd.conf
        owner: root
        group: root
        mode: '0644'
      notify: DHCP 서비스 재시작

    - name: 3. 방화벽에서 DHCP 서비스허용
      ansible.builtin.firewalld:
        service: dhcp
        permanent: yes
        state: enabled
        immediate: yes

    - name: 4. DHCP 서비스 활성화 및 시작
      ansible.builtin.systemd:
        name: dhcpd
        state: started
        enabled: yes

  handlers:
    - name: DHCP 서비스 재시작
      ansible.builtin.systemd:
        name: dhcpd
        state: restarted
